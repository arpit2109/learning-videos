    <style>
        /* Modern, sleek dark theme inspired by GitHub */
        :root { 
            --bg-color: #0d1117; 
            --sidebar-bg: #161b22; 
            --border-color: #30363d;
            --text-main: #c9d1d9; 
            --accent-color: #58a6ff;
            --hover-bg: #21262d;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            background: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar { 
            width: 350px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid var(--border-color); 
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h2 { margin: 0 0 10px 0; font-size: 1.2rem; }

        .search-box input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); 
            color: var(--text-main); 
            box-sizing: border-box; 
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Video List Styling */
        .video-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
        }

        .video-item { 
            padding: 12px 15px; 
            margin-bottom: 4px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .video-item::before {
            content: "▶";
            margin-right: 10px;
            font-size: 10px;
            color: #8b949e;
        }

        .video-item:hover { background: var(--hover-bg); }
        
        .video-item.active { 
            background: var(--accent-color); 
            color: #ffffff; 
            font-weight: bold;
        }
        .video-item.active::before { color: #ffffff; }

        /* Main Video Player Area */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 40px; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        .video-container { 
            width: 100%; 
            max-width: 1200px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }

        video { 
            width: 100%; 
            aspect-ratio: 16/9; 
            outline: none; 
            display: block;
        }

        .now-playing { 
            margin-top: 24px; 
            font-size: 1.5rem; 
            font-weight: 600; 
            color: var(--text-main);
            text-align: center;
        }

        /* Custom Scrollbar for Sidebar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--sidebar-bg); }
        ::-webkit-scrollbar-thumb { background: #484f58; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
    </style>

        // Function to render the sidebar list (with search filtering)
        function renderList(filterText = '') {
            videoList.innerHTML = ''; // Clear current list
            
            // Filter the 256 files based on search
            const filteredFiles = videoFiles.filter(file => 
                file.toLowerCase().includes(filterText.toLowerCase())
            );
            
            filteredFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = 'video-item';
                // Remove the .mp4 extension just for a cleaner display name
                div.textContent = file.replace('.mp4', ''); 
                
                // When clicked, play the video
                div.onclick = () => playVideo(file, div);
                videoList.appendChild(div);
            });

            if(filteredFiles.length === 0) {
                videoList.innerHTML = '<div style="padding: 15px; text-align: center; color: #8b949e;">No videos found.</div>';
            }
        }

        // Function to load and play the selected video
        function playVideo(filename, element) {
            // Highlight the active video in the sidebar
            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            // Update the video player source
            // ASSUMES your videos are in a folder named "videos/" in your repository
            videoSource.src = `videos/${filename}`;
            
            player.load(); // Reload the video element with the new file
            player.play().catch(error => {
                console.log("Autoplay prevented or file not found locally:", error);
            });
            
            // Update the title under the video player
            nowPlaying.textContent = filename.replace('.mp4', '');
        }

        // Listen for typing in the search bar
        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
